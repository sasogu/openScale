name: CI

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Create dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-build
          name: openScale dev build
          prerelease: true
          make_latest: false
          files: android_app/app/build/outputs/apk/debug/openScale-debug.apk
